name: Release

on:
  push:
    tags: ['v*']

# Split privileges: the test job runs the full dev toolchain (eslint, vitest,
# their plugins) with a read-only token; only the minimal build+attest+release
# job below holds write permissions, so dependency code never executes next to
# a token that could rewrite releases or mint attestations.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      # --ignore-scripts: dependency lifecycle scripts never run in CI.
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run audit

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # build provenance attestation
      attestations: write   # build provenance attestation
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run build
      # mcpb's package exports forbid resolving its package.json, so don't ask
      # node for the bin path — copy the tree and run the .bin shim directly.
      # The copy MUST be named node_modules: node only resolves the CLI's own
      # dependencies (commander, ...) from directories with that exact name.
      - name: Stash the lockfile-verified mcpb CLI before pruning dev deps
        run: mkdir -p /tmp/mcpb-tooling && cp -R node_modules /tmp/mcpb-tooling/node_modules
      - name: Prune to production dependencies (slim bundle)
        run: npm prune --omit=dev
      - name: Pack .mcpb (lockfile-verified mcpb copy, not a registry re-fetch)
        run: /tmp/mcpb-tooling/node_modules/.bin/mcpb pack
      - name: Attest build provenance for the bundle
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: '*.mcpb'
      - name: Create GitHub Release with the bundle
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" ./*.mcpb --title "$TAG" --notes "See CHANGELOG.md for release notes. Verify provenance with: gh attestation verify <file>.mcpb --repo Guck111/fenek-portfolio-companion"
