name: DCO

on: pull_request

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify Signed-off-by on every PR commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          fail=0
          for c in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            if ! git log -1 --format='%B' "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $c is missing a 'Signed-off-by' trailer (use git commit -s)"
              fail=1
            fi
          done
          exit $fail
